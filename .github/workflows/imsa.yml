name: IMSA Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"   # toutes les 6 heures
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Récupération du repo
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. Setup Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 3. Installation dépendances
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # =========================
      # 4. Lancer le scraper IMSA
      # =========================
      - name: Run IMSA scraper
        run: python imsa_scraper.py

      # =========================
      # 5. Commit automatique JSON
      # =========================
      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add imsa.json

          # Ne commit QUE si changement réel
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "auto update IMSA results"
          git push
