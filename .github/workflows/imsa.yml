name: IMSA Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run IMSA script
        run: python imsa_scraper.py

      - name: Commit JSON update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add imsa.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "auto update IMSA results"
          git push
